<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Tetris</title>
<style>
body{margin:0;background:radial-gradient(circle at top,#5769b5,#b21f1f,#fdbb2d);display:flex;justify-content:center;align-items:center;height:100vh;font-family:Segoe UI,sans-serif;color:#fff}
.navbar{position:absolute;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 28px;background:rgba(0,0,0,.5);backdrop-filter:blur(10px)}
.logo{font-weight:700;font-size:22px;background:linear-gradient(45deg,#00c6ff,#00ffcc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wrap{display:flex;gap:20px}
canvas{background:#0b0b0b;border-radius:14px;box-shadow:0 0 25px rgba(0,0,0,.9)}
.panel{background:rgba(0,0,0,.6);backdrop-filter:blur(10px);padding:16px;border-radius:14px;width:180px}
.title{font-size:16px;margin:8px 0;text-align:center}
.score{font-size:22px;text-align:center;color:#00e6ff;text-shadow:0 0 10px #00e6ff}
button{width:100%;margin-top:8px;padding:8px;border:0;border-radius:10px;background:linear-gradient(45deg,#00c6ff,#0072ff);color:#fff;cursor:pointer}
.controls{
  position:down;
  bottom:20px;
  display:flex;
  gap:10px;
  justify-content:center;
  width:100%;
}

.controls button{
  width:60px;
  height:60px;
  font-size:20px;
  border-radius:50%;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">
    🎮 MODERN TETRIS</div>
    
  <div style="font-size:12px;opacity:0.8;">

    <B>Developed and designed by: Chaitanya Deo </B>
    
  </div>
</nav>

<div class="wrap">
  <canvas id="game" width="240" height="400"></canvas>

  <div class="panel">
    <div class="title">Score</div>
    <div class="score" id="score">0</div>

    <div class="title">Level</div>
    <div class="score" id="level">1</div>

    <div class="title">Lines</div>
    <div class="score" id="lines">0</div>

    <button onclick="changeLevel(1)">Level +</button>
    <button onclick="changeLevel(-1)">Level -</button>
    <button onclick="togglePause()">Pause / Resume</button>
    <button onclick="restart()">Restart</button>
    <div class="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="move(1)">➡️</button>
  <button onclick="rotateBtn()">🔄</button>
  <button onclick="drop()">⬇️</button>
</div>
  </div>
</div>

<script>
  function rotateBtn(){
  const pos=player.pos.x;
  let offset=1;

  rotate(player.m);

  while(collide(player.m,player.pos)){
    player.pos.x+=offset;
    offset=-(offset+(offset>0?1:-1));

    if(offset>player.m[0].length){
      rotate(player.m);
      rotate(player.m);
      rotate(player.m);
      player.pos.x=pos;
      break;
    }
  }
}
const cvs=document.getElementById('game');
const ctx=cvs.getContext('2d');
ctx.scale(20,20);

const scoreEl=document.getElementById('score');
const levelEl=document.getElementById('level');
const linesEl=document.getElementById('lines');

const colors=[null,'#ff4d4d','#4da6ff','#4dff88','#cc66ff','#ffaa00','#ff66cc','#66ffff'];

function M(w,h){return Array.from({length:h},()=>Array(w).fill(0))}
function P(t){
  return t==='T'?[[0,1,0],[1,1,1],[0,0,0]]:
  t==='O'?[[2,2],[2,2]]:
  t==='L'?[[0,3,0],[0,3,0],[0,3,3]]:
  t==='J'?[[0,4,0],[0,4,0],[4,4,0]]:
  t==='I'?[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]]:
  t==='S'?[[0,6,6],[6,6,0],[0,0,0]]:
  [[7,7,0],[0,7,7],[0,0,0]]
}

const arena=M(12,20);

const player={
  pos:{x:0,y:0},
  m:null,
  score:0,
  level:1,
  lines:0
};

let queue=[];
let isPaused=false;

function refill(){
  const s='ILJOTSZ';
  while(queue.length<3)
    queue.push(P(s[(Math.random()*s.length)|0]));
}

function drawBlock(x,y,c){
  ctx.fillStyle=c;
  ctx.fillRect(x,y,1,1);
}

function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,cvs.width,cvs.height);

  arena.forEach((r,y)=>r.forEach((v,x)=>{
    if(v) drawBlock(x,y,colors[v]);
  }));

  if(player.m){
    player.m.forEach((r,y)=>r.forEach((v,x)=>{
      if(v) drawBlock(x+player.pos.x,y+player.pos.y,colors[v]);
    }));
  }

  if(isPaused){
    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,12,20);
    ctx.fillStyle="#fff";
    ctx.font="1px Arial";
    ctx.fillText("PAUSED",3.5,10);
  }
}

function collide(m,o){
  for(let y=0;y<m.length;y++){
    for(let x=0;x<m[y].length;x++){
      if(m[y][x] &&
        (arena[y+o.y] && arena[y+o.y][x+o.x]) !== 0){
        return true;
      }
    }
  }
  return false;
}

function merge(){
  player.m.forEach((r,y)=>r.forEach((v,x)=>{
    if(v) arena[y+player.pos.y][x+player.pos.x]=v;
  }));
}

function sweep(){
  let linesCleared=0;

  outer:for(let y=arena.length-1;y>=0;y--){
    for(let x=0;x<arena[y].length;x++){
      if(!arena[y][x]) continue outer;
    }

    arena.splice(y,1);
    arena.unshift(Array(12).fill(0));
    y--;
    linesCleared++;
  }

  if(linesCleared){
    player.lines+=linesCleared;
    player.score+=linesCleared*100*player.level;

    player.level=Math.floor(player.lines/10)+1;
    interval=Math.max(100,650-player.level*50);

    updateUI();
  }
}

function spawn(){
  refill();
  player.m=queue.shift();
  player.pos.y=0;
  player.pos.x=5;

  if(collide(player.m,player.pos)){
    restart();
  }
}

function rotate(matrix){
  for(let y=0;y<matrix.length;y++){
    for(let x=0;x<y;x++){
      [matrix[x][y],matrix[y][x]]=[matrix[y][x],matrix[x][y]];
    }
  }
  matrix.forEach(row=>row.reverse());
}

function move(dir){
  player.pos.x+=dir;
  if(collide(player.m,player.pos)){
    player.pos.x-=dir;
  }
}

function drop(){
  if(isPaused) return;

  player.pos.y++;
  if(collide(player.m,player.pos)){
    player.pos.y--;
    merge();
    sweep();
    spawn();
  }
  dc=0;
}

function changeLevel(dir){
  player.level=Math.max(1,player.level+dir);
  interval=Math.max(100,650-player.level*50);
  levelEl.textContent=player.level;
}

function togglePause(){
  isPaused=!isPaused;
}

function updateUI(){
  scoreEl.textContent=player.score;
  levelEl.textContent=player.level;
  linesEl.textContent=player.lines;
}

let last=0,dc=0,interval=650;

function update(t=0){
  const dt=t-last;
  last=t;

  if(!isPaused){
    dc+=dt;
    if(dc>interval) drop();
  }

  draw();
  requestAnimationFrame(update);
}

function restart(){
  arena.forEach(r=>r.fill(0));
  player.score=0;
  player.level=1;
  player.lines=0;

  interval=650;
  queue=[];

  updateUI();
  spawn();
}

spawn();
update();

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move(-1);
  else if(e.key==="ArrowRight") move(1);
  else if(e.key==="ArrowDown") drop();

  else if(e.key==="ArrowUp"){
    const pos=player.pos.x;
    let offset=1;

    rotate(player.m);

    while(collide(player.m,player.pos)){
      player.pos.x+=offset;
      offset=-(offset+(offset>0?1:-1));

      if(offset>player.m[0].length){
        rotate(player.m);
        rotate(player.m);
        rotate(player.m);
        player.pos.x=pos;
        break;
      }
    }
  }

  else if(e.key==="p"){
    togglePause();
  }
})
</script>
</body>
</html>
